name: "Build Android APK"
on:
  push:
    branches:
      - main

jobs:
  export:
    name: Export Android
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.2.2

      - name: Download and Install Godot Export Templates
        run: |
          wget -q https://downloads.tuxfamily.org/godotengine/4.2.2/Godot_v4.2.2-stable_export_templates.tpz
          mkdir -p ~/.local/share/godot/export_templates/4.2.2.stable
          unzip -q Godot_v4.2.2-stable_export_templates.tpz
          mv templates/* ~/.local/share/godot/export_templates/4.2.2.stable/
          rm -rf templates Godot_v4.2.2-stable_export_templates.tpz

      - name: Create Export Directories
        run: mkdir -p build/android

      - name: Export Android APK
        run: godot --headless --export-release "Android" build/android/SlideGolf.apk
