name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Export Android
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Godot CLI and Templates
        run: |
          mkdir -p ~/bin
          # 1. Godot 4.7 Engine İndiriliyor (IPv4 zorlanarak ve curl ile 5 kez yeniden deneme yapılandırarak)
          curl -4 -LO --retry 5 --retry-delay 5 https://github.com/godotengine/godot/releases/download/4.7-stable/Godot_v4.7-stable_linux.x86_64.zip
          unzip -q Godot_v4.7-stable_linux.x86_64.zip
          mv Godot_v4.7-stable_linux.x86_64 ~/bin/godot
          rm Godot_v4.7-stable_linux.x86_64.zip
          
          # 2. Şablon Klasörleri Oluşturuluyor
          mkdir -p ~/.local/share/godot/export_templates/4.7.stable
          mkdir -p ~/.local/share/godot/templates/4.7.stable
          
          # 3. Tam Uyumlu Godot 4.7 Şablonları İndiriliyor (IPv4 zorlanarak ve curl ile 5 kez yeniden deneme yapılandırarak)
          curl -4 -LO --retry 5 --retry-delay 5 https://downloads.tuxfamily.org/godotengine/4.7/Godot_v4.7-stable_export_templates.tpz
          unzip -q Godot_v4.7-stable_export_templates.tpz
          
          # 4. Şablonlar Doğru Dizine Dağıtılıyor
          cp -r templates/* ~/.local/share/godot/export_templates/4.7.stable/
          cp -r templates/* ~/.local/share/godot/templates/4.7.stable/
          rm -rf templates Godot_v4.7-stable_export_templates.tpz

      - name: Verify Godot Installation
        run: |
          ~/bin/godot --version

      - name: Export Android APK
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
        run: |
          mkdir -p build/android
          ~/bin/godot --headless --verbose --export-debug "Android" build/android/SlideGolf.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SlideGolf-APK
          path: build/android/SlideGolf.apk